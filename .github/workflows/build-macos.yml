name: Build · macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            third_repo: Liz-Nozomi/openppp2-macos-arm64-environment
          - arch: x86_64
            third_repo: liulilittle/openppp2-macos-amd64-environment

    steps:
      - uses: actions/checkout@v4

      - name: Clone third-party environment
        run: git clone --depth 1 "https://github.com/${{ matrix.third_repo }}.git" "${{ runner.temp }}/3rd"

      - name: Build openppp2
        run: |
          TP="${{ runner.temp }}/3rd"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DTHIRD_PARTY_LIBRARY_DIR="$TP"
          make -j$(sysctl -n hw.physicalcpu)

      - name: Package artifact
        run: |
          ARTIFACT=openppp2-darwin-${{ matrix.arch }}.zip
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV
          cd bin && zip -r "$ARTIFACT" ppp

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: bin/${{ env.ARTIFACT }}
          if-no-files-found: error
