name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BOOST_VERSION: "1.86.0"
  OPENSSL_VERSION: "3.0.13"
  JEMALLOC_VERSION: "5.3.0"
  GO_VERSION: "1.22"

jobs:

  # =========================================================================
  # 1. Linux native amd64
  # =========================================================================
  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git zip unzip curl wget \
            libkrb5-dev libicu-dev libssl-dev libunwind-dev \
            autoconf clang

      - name: Cache third-party libraries
        id: cache-third
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/third-party
          key: linux-amd64-third-v2-boost${{ env.BOOST_VERSION }}-openssl${{ env.OPENSSL_VERSION }}-jemalloc${{ env.JEMALLOC_VERSION }}

      - name: Build Boost
        if: steps.cache-third.outputs.cache-hit != 'true'
        run: |
          mkdir -p third-party && cd third-party
          wget -q "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VERSION//./_}.tar.bz2"
          tar jxf boost_*.tar.bz2 && rm boost_*.tar.bz2
          mv boost_* boost
          cd boost && ./bootstrap.sh && ./b2 cxxflags=-fPIC -j$(nproc)

      - name: Build OpenSSL
        if: steps.cache-third.outputs.cache-hit != 'true'
        run: |
          mkdir -p third-party && cd third-party
          wget -q "https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz"
          tar zxf openssl-*.tar.gz && rm openssl-*.tar.gz
          mv openssl-* openssl
          cd openssl && ./Configure && make -j$(nproc)

      - name: Build jemalloc
        if: steps.cache-third.outputs.cache-hit != 'true'
        run: |
          mkdir -p third-party && cd third-party
          wget -q "https://github.com/jemalloc/jemalloc/releases/download/${JEMALLOC_VERSION}/jemalloc-${JEMALLOC_VERSION}.tar.bz2"
          tar jxf jemalloc-*.tar.bz2 && rm jemalloc-*.tar.bz2
          mv jemalloc-* jemalloc
          cd jemalloc && ./autogen.sh --with-jemalloc-prefix=je_ && make -j$(nproc)

      - name: Build openppp2
        run: |
          TP="${{ github.workspace }}/third-party"
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DTHIRD_PARTY_LIBRARY_DIR="$TP"
          make -j$(nproc)

      - name: Package artifact
        run: |
          cd bin
          zip -r openppp2-linux-amd64.zip ppp

      - uses: actions/upload-artifact@v4
        with:
          name: openppp2-linux-amd64
          path: bin/openppp2-linux-amd64.zip
          if-no-files-found: error

  # =========================================================================
  # 2. Linux cross-compile
  # =========================================================================
  linux-cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/aarch64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            apt_pkg: aarch64-linux-gnu
            third_dir: aarch64
          - platform: linux/armv7l
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            apt_pkg: arm-linux-gnueabihf
            third_dir: armv7l
          - platform: linux/riscv64
            cc: riscv64-linux-gnu-gcc
            cxx: riscv64-linux-gnu-g++
            apt_pkg: riscv64-linux-gnu
            third_dir: riscv64
          - platform: linux/ppc64el
            cc: powerpc64le-linux-gnu-gcc
            cxx: powerpc64le-linux-gnu-g++
            apt_pkg: powerpc64le-linux-gnu
            third_dir: ppc64el
          - platform: linux/s390x
            cc: s390x-linux-gnu-gcc
            cxx: s390x-linux-gnu-g++
            apt_pkg: s390x-linux-gnu
            third_dir: s390x
          - platform: linux/mipsel
            cc: mipsel-linux-gnu-gcc
            cxx: mipsel-linux-gnu-g++
            apt_pkg: mipsel-linux-gnu
            third_dir: mipsel

    steps:
      - uses: actions/checkout@v4

      - name: Clone third-party environment
        run: git clone --depth 1 https://github.com/liulilittle/openppp2-ubuntu-3rd-environment.git "${{ runner.temp }}/3rd"

      - name: Install cross-compiler
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake zip unzip \
            gcc-${{ matrix.apt_pkg }} g++-${{ matrix.apt_pkg }}

      - name: Build openppp2
        run: |
          TP="${{ runner.temp }}/3rd/${{ matrix.third_dir }}"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DTHIRD_PARTY_LIBRARY_DIR="$TP"
          make -j$(nproc)

      - name: Package artifact
        run: |
          PLATFORM_SAFE="${{ matrix.platform }}"
          PLATFORM_SAFE="${PLATFORM_SAFE//\//-}"
          ARTIFACT="openppp2-${PLATFORM_SAFE}-cross.zip"
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV
          cd bin && zip -r "$ARTIFACT" ppp

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: bin/${{ env.ARTIFACT }}
          if-no-files-found: error

  # =========================================================================
  # 3. Windows x64
  # =========================================================================
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]
        platform: [x64]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - uses: NuGet/setup-nuget@v2

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgPath = "C:\vcpkg"
          if (-not (Test-Path $vcpkgPath)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgPath
            cd $vcpkgPath
            .\bootstrap-vcpkg.bat
          } else {
            Write-Host "vcpkg already installed at $vcpkgPath"
          }
          echo $vcpkgPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "VCPKG_ROOT=$vcpkgPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          vcpkg install `
            boost-system:$env:VCPKG_DEFAULT_TRIPLET `
            boost-coroutine:$env:VCPKG_DEFAULT_TRIPLET `
            boost-thread:$env:VCPKG_DEFAULT_TRIPLET `
            boost-context:$env:VCPKG_DEFAULT_TRIPLET `
            boost-regex:$env:VCPKG_DEFAULT_TRIPLET `
            boost-filesystem:$env:VCPKG_DEFAULT_TRIPLET `
            openssl:$env:VCPKG_DEFAULT_TRIPLET `
            jemalloc:$env:VCPKG_DEFAULT_TRIPLET

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore .\ppp.sln

      - name: Build openppp2
        shell: pwsh
        run: |
          msbuild .\ppp.sln /m /restore `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:VcpkgEnableManifest=false `
            /p:VcpkgEnabled=true `
            /p:VcpkgUseStatic=true

      - name: Collect artifacts
        shell: pwsh
        run: |
          $out = "${{ matrix.platform }}\${{ matrix.configuration }}"
          $artifactDir = "artifact"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          foreach ($f in @('ppp.exe', 'PaperAirplane.dll', 'wintun.dll')) {
            $src = Join-Path $out $f
            if (Test-Path $src) { Copy-Item $src $artifactDir -Force }
          }

          foreach ($item in @(
            @{ S = 'Driver\x64\PaperAirplane.dll'; T = 'PaperAirplane.dll' },
            @{ S = 'Driver\x64\sysproxy64.exe';   T = 'sysproxy64.exe' }
          )) {
            $src = Join-Path $env:GITHUB_WORKSPACE $item.S
            $tgt = Join-Path $artifactDir $item.T
            if ((-not (Test-Path $tgt)) -and (Test-Path $src)) { Copy-Item $src $tgt -Force }
          }

          foreach ($f in @(
            'appsettings.json', 'cacert.pem', 'cacert.sha256',
            'dns-rules.txt', 'firewall-rules.txt', 'ip.txt',
            'cmcc.txt', 'starrylink.net.key', 'starrylink.net.pem'
          )) {
            $src = Join-Path $env:GITHUB_WORKSPACE $f
            if (Test-Path $src) { Copy-Item $src $artifactDir -Force }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: openppp2-windows-${{ matrix.platform }}-${{ matrix.configuration }}
          path: artifact
          if-no-files-found: error

  # =========================================================================
  # 4. macOS
  # =========================================================================
  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            third_repo: Liz-Nozomi/openppp2-macos-arm64-environment
          - arch: x86_64
            third_repo: liulilittle/openppp2-macos-amd64-environment

    steps:
      - uses: actions/checkout@v4

      - name: Clone third-party environment
        run: git clone --depth 1 "https://github.com/${{ matrix.third_repo }}.git" "${{ runner.temp }}/3rd"

      - name: Build openppp2
        run: |
          TP="${{ runner.temp }}/3rd"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DTHIRD_PARTY_LIBRARY_DIR="$TP"
          make -j$(sysctl -n hw.physicalcpu)

      - name: Package artifact
        run: |
          ARTIFACT=openppp2-darwin-${{ matrix.arch }}.zip
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV
          cd bin && zip -r "$ARTIFACT" ppp

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: bin/${{ env.ARTIFACT }}
          if-no-files-found: error

  # =========================================================================
  # 5. Android
  # =========================================================================
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            ppp_abi: aarch64
          - abi: armeabi-v7a
            ppp_abi: armv7a
          - abi: x86
            ppp_abi: x86
          - abi: x86_64
            ppp_abi: x64

    steps:
      - uses: actions/checkout@v4

      - name: Cache NDK and dependencies
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ndk
          key: android-ndk-r20b-boost174-openssl111i

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/ndk" && cd "${{ runner.temp }}/ndk"
          wget -q https://dl.google.com/android/repository/android-ndk-r20b-linux-x86_64.zip
          unzip -q android-ndk-r20b-linux-x86_64.zip && rm android-ndk-r20b-linux-x86_64.zip
          mv android-ndk-r20b abi

      - name: Clone Boost for Android
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/ndk"
          git clone --depth 1 https://github.com/liulilittle/boost-1.74-for-android-r20b-fpic.git "${{ runner.temp }}/ndk/boost"

      - name: Clone OpenSSL for Android
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/ndk"
          git clone --depth 1 https://github.com/liulilittle/openssl-1.1.1i-for-android-r20b.git "${{ runner.temp }}/ndk/openssl"

      - name: Build openppp2
        run: |
          NDK_ROOT="${{ runner.temp }}/ndk/abi"
          TP="${{ runner.temp }}/ndk"
          export PPP_ANDROID_ABI=${{ matrix.ppp_abi }}

          cd android && mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DCMAKE_SYSTEM_NAME=Android \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_NATIVE_API_LEVEL=21 \
            -DANDROID_STL=c++_static \
            -DTHIRD_PARTY_LIBRARY_DIR="$TP"
          make -j$(nproc)

      - name: Package artifact
        run: |
          ARTIFACT=openppp2-android-${{ matrix.abi }}.zip
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV
          cd bin/android/${{ matrix.abi }}
          zip -r "$ARTIFACT" libopenppp2.so
          mv "$ARTIFACT" ../../

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: bin/${{ env.ARTIFACT }}
          if-no-files-found: error

  # =========================================================================
  # 6. Go Guardian
  # =========================================================================
  go-guardian:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build WebUI
        working-directory: go/guardian/webui
        run: |
          npm ci
          npm run build

      - name: Build guardian daemon
        working-directory: go/guardian
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o "guardian${EXT}" .

      - name: Build guardian TUI
        working-directory: go/guardian/cmd/tui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o "guardian-tui${EXT}" .

      - name: Package artifact
        working-directory: go/guardian
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          ARTIFACT="guardian-${SUFFIX}.tar.gz"
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV

          mkdir -p staging
          cp "guardian${EXT}" staging/
          cp "cmd/tui/guardian-tui${EXT}" staging/
          cp appsettings.json staging/ 2>/dev/null || true

          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd staging && zip -r "../guardian-${SUFFIX}.zip" .)
            echo "ARTIFACT=guardian-${SUFFIX}.zip" >> $GITHUB_ENV
          else
            tar czf "$ARTIFACT" -C staging .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: go/guardian/${{ env.ARTIFACT }}
          if-no-files-found: error

  # =========================================================================
  # 7. Summary
  # =========================================================================
  summary:
    if: always()
    needs:
      - linux-amd64
      - linux-cross
      - windows
      - macos
      - android
      - go-guardian
    runs-on: ubuntu-latest
    steps:
      - name: Build result summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux amd64     | ${{ needs.linux-amd64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux cross     | ${{ needs.linux-cross.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows         | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS           | ${{ needs.macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android         | ${{ needs.android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Guardian     | ${{ needs.go-guardian.result }} |" >> $GITHUB_STEP_SUMMARY
