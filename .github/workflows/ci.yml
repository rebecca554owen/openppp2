name: CI · Summary

on:
  workflow_run:
    workflows:
      - "Build · Linux amd64"
      - "Build · Linux Cross"
      - "Build · Windows x64"
      - "Build · macOS"
      - "Build · Android"
      - "Build · Go Guardian"
    types: [completed]

jobs:
  summary:
    name: Build result dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Report triggering workflow
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Conclusion |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ github.event.workflow_run.name }} | ${{ github.event.workflow_run.conclusion }} |" >> $GITHUB_STEP_SUMMARY
